name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send a GET request to the Streamlit app
        run: |
          curl -sI https://anti-plasmodial-screening.streamlit.app/ | head -n 1
