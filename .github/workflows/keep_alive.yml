name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Send a loop-proof request to the Streamlit app
        run: |
          # Bypasses redirection loops by sending a basic silent request
          curl -s --max-time 15 https://anti-plasmodial-screening.streamlit.app/ > /dev/null || true
